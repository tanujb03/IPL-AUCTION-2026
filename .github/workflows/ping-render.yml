name: Ping Render Instances
on:
  schedule:
    - cron: '*/10 * * * *' # Runs every 10 minutes
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd backend
          npm install

      - name: Run Pinging Service
        run: |
          cd backend
          # Run the script for exactly 1 minute to ping everything once
          # node ping_service.js loops indefinitely using setInterval
          # so we'll just run a one-off curl loop instead for GH actions
          node -e "
            const TARGET_URLS = [
                process.env.BACKEND_URL_1,
                process.env.BACKEND_URL_2,
                process.env.BACKEND_URL_3,
                process.env.BACKEND_URL_4
            ].filter(Boolean);
            
            if (TARGET_URLS.length === 0) {
              console.log('No BACKEND_URLs configured in secrets.');
              process.exit(0);
            }
            
            TARGET_URLS.forEach(url => {
               const target = url.replace(/\/$/, '') + '/api/health';
               require('https').get(target, res => {
                  console.log('Pinged', target, '=>', res.statusCode);
               });
            });
            setTimeout(() => process.exit(0), 5000);
          "
        env:
          BACKEND_URL_1: ${{ secrets.BACKEND_URL_1 }}
          BACKEND_URL_2: ${{ secrets.BACKEND_URL_2 }}
          BACKEND_URL_3: ${{ secrets.BACKEND_URL_3 }}
          BACKEND_URL_4: ${{ secrets.BACKEND_URL_4 }}
