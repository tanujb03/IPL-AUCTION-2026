# ═══════════════════════════════════════════════════════════════
# IPL Auction 2026 — Docker Compose
# Each classroom runs ONE isolated stack
# Usage: docker-compose up -d
# ═══════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auction_user
      POSTGRES_PASSWORD: auction_pass
      POSTGRES_DB: ipl_auction
    ports:
      - "5444:5432"
    volumes:
      - pgdata2:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U auction_user -d ipl_auction" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      DATABASE_URL: "postgresql://auction_user:auction_pass@postgres:5432/ipl_auction?schema=public"
      PORT: 5000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://${CLASSROOM_IP:-localhost}:${BACKEND_PORT:-5000}"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production

volumes:
  pgdata2:
    driver: local
